<!DOCTYPE html> 
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Академія Руху CRM — Спрощена</title> 

<style>
body{
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
  color: #222;
}

header{
  background: #1f3b4d;
  color: white;
  padding: 15px;
  font-size: 18px;
  text-align: center;
}

.container{
  display: flex;
  min-height: 100vh;
}

nav{
  width: 220px;
  background: #263845;
  color: white;
  padding: 10px;
}

nav button{
  width: 100%;
  margin: 5px 0;
  padding: 12px;
  border: none;
  background: #34495e;
  color: white;
  cursor: pointer;
  border-radius: 6px;
  font-size: 14px;
}

nav button:hover{ background: #3d5f77; }

main{
  flex: 1;
  padding: 15px;
}

.card{
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, select{
  padding: 10px;
  margin: 5px 0;
  width: 100%;
  box-sizing: border-box;
  font-size: 14px;
}

select[multiple] {
  height: 80px;
}

button{
  font-size: 14px;
  padding: 8px 12px;
  cursor: pointer;
  background: #34495e;
  color: white;
  border: none;
  border-radius: 4px;
}

button:hover{ background: #2c3e50; }

.freeze-box {
  margin-top: 10px;
  background: #f9f9f9;
  padding: 10px;
  border-left: 3px solid #1f3b4d;
}

@media (max-width: 768px){
  .container{ flex-direction: column; }
  nav{ width: 100%; display: flex; }
  nav button{ margin: 5px; white-space: nowrap; }
}
</style>
</head>

<body>

<header>Академія Руху — CRM система</header>

<div class="container">

<nav>
<button onclick="show('dashboard')">Головна</button>
<button onclick="show('visitors')">Відвідувачі</button>
<button onclick="show('trainers')">Тренери</button>
</nav>

<main>

<div id="dashboard" class="view">
<div class="card">
  <h2>Dashboard</h2>
  <div id="stats"></div>
</div>

<div class="card">
  <h3>Перевірка дат</h3>
  <label for="dashboardDate" style="font-size:13px; color:#555;">Оберіть дату для аналізу системи:</label>
  <input type="date" id="dashboardDate" onchange="renderDashboardData()">
</div>

<div class="card">
  <h3>Сьогодні відсутні</h3>
  <div id="todayAbsent" style="font-weight:bold; color: #c0392b;"></div>
</div>

<div class="card">
  <h3>Нагадування (Завтра закінчується заморозка)</h3>
  <div id="reminders" style="font-weight:bold; color: #d35400;"></div>
</div>
</div>

<div id="visitors" class="view" style="display:none">
<div class="card">
  <h2>Додати відвідувача</h2>
  <input id="v_name" placeholder="Ім'я">
  <input id="v_surname" placeholder="Прізвище">

  <label style="font-size: 13px; color: #555;">Оберіть тренерів (можна обрати 1 або 2 затиснувши Ctrl):</label>
  <select id="v_trainers" multiple></select>

  <button onclick="addVisitor()">Додати відвідувача</button>
</div>

<div class="card">
  <h2>Список відвідувачів</h2>
  <div id="visitorList"></div>
</div>
</div>

<div id="trainers" class="view" style="display:none">
<div class="card">
  <h2>Додати тренера</h2>
  <input id="t_name" placeholder="Ім'я тренера">
  <button onclick="addTrainer()">Додати</button>
</div>

<div class="card">
  <h3>Список тренерів</h3>
  <div id="trainerList"></div>
</div>
</div>

</main>
</div>

<script>
let visitors = JSON.parse(localStorage.getItem("visitors")||"[]");
let trainers = JSON.parse(localStorage.getItem("trainers")||"[]");

// Автоматично виставляємо сьогоднішню дату при старті
document.getElementById("dashboardDate").value = new Date().toISOString().slice(0,10);

function save(){
  localStorage.setItem("visitors", JSON.stringify(visitors));
  localStorage.setItem("trainers", JSON.stringify(trainers));
}

function show(v){
  document.querySelectorAll(".view").forEach(x=>x.style.display="none");
  document.getElementById(v).style.display="block";
  renderAll();
}

function addTrainer(){
  let n = document.getElementById("t_name").value.trim();
  if(!n) return;
  trainers.push({id: Date.now(), name: n});
  document.getElementById("t_name").value = "";
  save();
  renderAll();
}

function renderTrainers(){
  let sel = document.getElementById("v_trainers");
  if(sel) {
    sel.innerHTML = "";
    trainers.forEach(t=>{
      sel.innerHTML += `<option value="${t.name}">${t.name}</option>`;
    });
  }
  document.getElementById("trainerList").innerHTML =
    trainers.map(t=>`<div style="padding:5px 0;">• ${t.name}</div>`).join("");
}

function addVisitor(){
  let name = document.getElementById("v_name").value.trim();
  let surname = document.getElementById("v_surname").value.trim();
  
  if(!name || !surname) {
    alert("Заповніть ім'я та прізвище!");
    return;
  }

  // Отримуємо вибраних тренерів з мультиселекту
  let selectEl = document.getElementById("v_trainers");
  let selectedTrainers = [];
  
  if (selectEl && selectEl.selectedOptions.length > 0) {
    selectedTrainers = Array.from(selectEl.selectedOptions).map(opt => opt.value);
  }

  if(selectedTrainers.length > 2) {
    alert("Можна обрати не більше 2-х тренерів!");
    return;
  }
  
  // Якщо тренерів взагалі немає в системі або нікого не обрали
  if(selectedTrainers.length === 0) {
    selectedTrainers = ["Не вказано"];
  }

  visitors.push({
    id: Date.now(),
    name: name,
    surname: surname,
    trainers: selectedTrainers,
    freezes: []
  });

  save();
  document.getElementById("v_name").value = "";
  document.getElementById("v_surname").value = "";
  renderAll();
}

  // Отримуємо вибраних тренерів з мультиселекту
  let selectedTrainers = Array.from(document.getElementById("v_trainers").selectedOptions).map(opt => opt.value);
  if(selectedTrainers.length > 2) {
    alert("Можна обрати не більше 2-х тренерів!");
    return;
  }
  if(selectedTrainers.length === 0) {
    selectedTrainers = ["Не вказано"];
  }

  visitors.push({
    id: Date.now(),
    name: name,
    surname: surname,
    trainers: selectedTrainers,
    freezes: []
  });

  save();
  document.getElementById("v_name").value = "";
  document.getElementById("v_surname").value = "";
  renderAll();
}

function renderVisitors(){
  document.getElementById("visitorList").innerHTML =
  visitors.map(v=>`
  <div class="card">
    <b>${v.name} ${v.surname}</b><br>
    <small style="color:#555;">Тренер: ${v.trainers.join(", ")}</small>
    <div class="freeze-box">
      <small><b>Оформити заморозку:</b></small><br>
      З: <input type="date" id="fr_from_${v.id}" style="width:auto; padding:3px;"> 
      По: <input type="date" id="fr_to_${v.id}" style="width:auto; padding:3px;">
      <button style="padding:3px 8px; font-size:12px;" onclick="saveFreeze(${v.id})">Зберегти</button>
    </div>
  </div>
  `).join("");
}

function saveFreeze(id) {
  let from = document.getElementById(`fr_from_${id}`).value;
  let to = document.getElementById(`fr_to_${id}`).value;

  if(!from || !to) {
    alert("Оберіть обидві дати заморозки!");
    return;
  }

  let v = visitors.find(x=>x.id == id);
  if(v){
    v.freezes.push({from, to});
    save();
    renderAll();
    alert(`Заморозку додано.`);
  }
}

// Перевірка чи відсутній (заморожений) у конкретну дату
function isFrozen(v, date){
  if(!date) return false;
  return v.freezes.some(f => date >= f.from && date <= f.to);
}

// Перевірка чи закінчується заморозка у конкретну дату
function endsOn(v, date) {
  if(!date) return false;
  return v.freezes.some(f => f.to === date);
}

function renderDashboardData() {
  let targetDateStr = document.getElementById("dashboardDate").value;
  if(!targetDateStr) return;

  // Вираховуємо "Завтра" відносно обраної дати
  let targetDate = new Date(targetDateStr);
  targetDate.setDate(targetDate.getDate() + 1);
  let tomorrowStr = targetDate.toISOString().slice(0,10);

  // 1. Сортуємо та виводимо відсутніх СЬОГОДНІ (+ тренери)
  let absentList = visitors.filter(v => isFrozen(v, targetDateStr));
  document.getElementById("todayAbsent").innerHTML = absentList.length 
    ? absentList.map(v => `• ${v.name} ${v.surname} <span style="font-weight:normal; font-size:13px; color:#555;">(Тренер: ${v.trainers.join(", ")})</span>`).join("<br>")
    : "Немає відсутніх на цю дату.";

  // 2. Виводимо нагадування (в кого закінчується ТОМУ ЩО ЗАВТРА вони мають бути)
  let reminderList = visitors.filter(v => endsOn(v, targetDateStr));
  document.getElementById("reminders").innerHTML = reminderList.length
    ? reminderList.map(v => ` Навчання відновиться завтра: ${v.name} ${v.surname} (Тренер: ${v.trainers.join(", ")})`).join("<br>")
    : "Завтра ніхто не повертається із заморозки.";
}

function renderDashboard(){
  document.getElementById("stats").innerHTML =
    `Всього відвідувачів: ${visitors.length}<br>Всього тренерів: ${trainers.length}`;
  renderDashboardData();
}

function renderAll(){
  renderTrainers();
  renderVisitors();
  renderDashboard();
}

// Початковий рендер
renderAll();
</script>

</body>
</html>
